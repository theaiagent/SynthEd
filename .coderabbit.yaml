language: en
reviews:
  profile: chill
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "synthed/simulation/**"
      instructions: "This is a theory-grounded ODL simulation engine. Check for determinism (RNG consistency), immutability (frozen dataclasses), and theoretical correlation preservation."
    - path: "synthed/validation/**"
      instructions: "Statistical validation with 5 levels (demographics, correlations, temporal, privacy, backstory). Ensure tests use appropriate statistical methods."
    - path: "synthed/analysis/**"
      instructions: "Sobol sensitivity and NSGA-II calibration. Check parameter bounds, pickle safety for multiprocessing, and Optuna API usage."
    - path: "tests/**"
      instructions: "Minimum 80% coverage. TDD approach. Check for flaky tests (stochastic assertions need tolerance)."
chat:
  auto_reply: true
