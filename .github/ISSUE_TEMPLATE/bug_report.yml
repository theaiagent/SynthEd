name: Bug Report
description: Report a bug or unexpected behavior in SynthEd
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - Ubuntu 22.04
        - Ubuntu 24.04
        - macOS 14 (Sonoma)
        - macOS 15 (Sequoia)
        - Other (specify in Additional Context)
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.12"
        - "3.11"
        - "3.10"
    validations:
      required: true

  - type: input
    id: synthed-version
    attributes:
      label: SynthEd Version
      description: "Run: python -c \"import synthed; print(synthed.__version__)\""
      placeholder: "e.g., 0.6.3"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install Method
      options:
        - "pip install -e . (editable)"
        - "pip install -e '.[dev]' (editable+dev)"
        - "pip install synthed"
        - Other (specify in Additional Context)
    validations:
      required: true

  - type: textarea
    id: pipeline-report
    attributes:
      label: Pipeline Report (if applicable)
      description: Paste the relevant section of pipeline_report.json.
      render: json

  - type: input
    id: population
    attributes:
      label: Population Size and Seed
      description: "N and seed used, e.g., N=500, seed=42"
      placeholder: "N=200, seed=42"

  - type: textarea
    id: persona-config
    attributes:
      label: PersonaConfig Changes
      description: Any changes from default PersonaConfig. Leave blank if using defaults.
      render: python

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
