name: Bug Report
description: Report a defect or unexpected behavior in SynthEd
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug in SynthEd. Please provide detailed information to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug. What is not working as expected?
      placeholder: |
        Example: When running pipeline.run() with n_students=500, the simulation crashes on week 7.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the problem. Include code sample if relevant.
      placeholder: |
        1. Import SynthEdPipeline
        2. Create pipeline with n_students=500
        3. Call pipeline.run()
        4. Error occurs at week 7
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: code_example
    attributes:
      label: Code Example
      description: Minimal code snippet that reproduces the bug
      placeholder: |
        from synthed.pipeline import SynthEdPipeline
        pipeline = SynthEdPipeline(seed=42)
        report = pipeline.run(n_students=500)
      render: python
    validations:
      required: false

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead? What did you expect?
      placeholder: Simulation should complete all 14 weeks for all students without errors.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error message or traceback.
      placeholder: |
        Traceback (most recent call last):
          File "myapp.py", line X, in <module>
            report = pipeline.run(n_students=500)
          ...
        ValueError: Invalid engagement value
      render: python
    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python Version
      description: Which Python version are you using?
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - Other (specify below)
    validations:
      required: true

  - type: textarea
    id: python_other
    attributes:
      label: Python Version (if Other)
      description: Specify your Python version if not listed above
      placeholder: "3.9"
    validations:
      required: false

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify below)
    validations:
      required: true

  - type: textarea
    id: os_version
    attributes:
      label: OS Version (if Other)
      description: Specify your OS if not listed above
      placeholder: "Windows 11 Pro"
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Relevant Dependencies
      description: Run "pip list" and paste output, or list installed versions of key packages
      placeholder: |
        numpy==1.24.0
        scipy==1.10.0
        optuna==3.0.0
        SALib==1.4.0
      render: text
    validations:
      required: false

  - type: textarea
    id: error_output
    attributes:
      label: Full Error Output or Traceback
      description: Include the complete error message and traceback
      render: python
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context that might be helpful (configuration files, data samples, etc.)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Verification
      description: Before submitting, verify the following
      options:
        - label: I have searched existing issues and found no duplicates
          required: true
        - label: I am using the latest version of SynthEd
          required: true
        - label: I have provided all requested information above
          required: true
        - label: I have included a minimal code example
          required: false
